name: Build Mobile App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-apks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm install

      - name: Build helper web
        run: npm run build:web

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Build Maru Link APK
        run: ./android/gradlew :app:assembleDebug

      - name: Build PhotoServe APK
        run: ./android/gradlew :photoserve:assembleDebug

      - name: Build Cup-Cupper-Cuppers APK
        run: ./android/gradlew :cupcuppercuppers:assembleDebug

      - name: Build Dael or No Dael APK
        run: ./android/gradlew :daelornodael:assembleDebug

      - name: Build TUP Grade Solver APK
        run: ./android/gradlew :tupgradesolver:assembleDebug

      - name: Rename APKs
        run: |
          mkdir -p release-apks
          cp android/app/build/outputs/apk/debug/app-debug.apk release-apks/maru-link.apk
          cp android/photoserve/build/outputs/apk/debug/photoserve-debug.apk release-apks/maru-photoserve.apk
          cp android/cupcuppercuppers/build/outputs/apk/debug/cupcuppercuppers-debug.apk release-apks/maru-cupcuppercuppers.apk
          cp android/daelornodael/build/outputs/apk/debug/daelornodael-debug.apk release-apks/maru-daelornodael.apk
          cp android/tupgradesolver/build/outputs/apk/debug/tupgradesolver-debug.apk release-apks/maru-tupgradesolver.apk

      - name: Upload APKs artifact
        uses: actions/upload-artifact@v4
        with:
          name: maru-apks
          path: release-apks/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Maru ${{ github.ref_name }}
          body: |
            ## Maru Ecosystem

            ### Maru Link (required)
            Central hub for downloads, updates, account sync, and Marucast controls.

            ### Applets (require Maru Link)
            - **PhotoServe** — 4R photo layouts, export, and direct print
            - **Cup-Cupper-Cuppers** — Case-picking shell game
            - **Dael or No Dael** — Deal or No Deal clone
            - **TUP Grade Solver** — Score-target calculator

            ### Installation
            1. Install **maru-link.apk** first
            2. Install any applet APKs you want
            3. Open applets from the Maru Link catalog

            ### Requirements
            - Android 8.0+
            - Same Wi-Fi network for Marucast
          files: |
            release-apks/maru-link.apk
            release-apks/maru-photoserve.apk
            release-apks/maru-cupcuppercuppers.apk
            release-apks/maru-daelornodael.apk
            release-apks/maru-tupgradesolver.apk
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
