<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Maru Helper</title>
    <script type="module" src="./main.ts"></script>
  </head>
  <body>
    <main class="helper-shell">
      <section class="helper-card">
        <div id="helper-content">
          <div class="helper-kicker">Maru Helper</div>
          <h1 id="helper-title">Waiting for Maru</h1>
          <p id="helper-status">
            This tiny helper only handles Android notification setup and delivery.
          </p>
          <p id="helper-detail" class="helper-detail">
            Open the Maru website and press Connect Helper App when you want to
            refresh notification access.
          </p>
          <div class="helper-actions">
            <a
              id="helper-open-link"
              class="helper-button helper-button-subtle helper-hidden"
              target="_blank"
              rel="noreferrer"
            >
              Open Maru
            </a>
            <button id="helper-close-button" class="helper-button" type="button">
              Close Helper
            </button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
